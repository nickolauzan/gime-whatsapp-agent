[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/webhooks/whatsapp"
  to = "/.netlify/functions/whatsapp-webhook"
  status = 200

[[redirects]]
  from = "/api/agent/reply"
  to = "/.netlify/functions/agent-reply"
  status = 200

[[redirects]]
  from = "/api/agent/availability"
  to = "/.netlify/functions/agent-availability"
  status = 200

[[redirects]]
  from = "/api/agent/book"
  to = "/.netlify/functions/agent-book"
  status = 200

[[redirects]]
  from = "/api/agent/reactivate"
  to = "/.netlify/functions/agent-reactivate"
  status = 200
